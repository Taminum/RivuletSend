# Production stack behind Caddy (automatic HTTPS).
#   deploy/install.sh writes .env and runs:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Only Caddy publishes ports. Postgres, the API and signaling are reachable
# only on the internal compose network — nothing but 80/443 is exposed.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rivulet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: rivulet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rivulet"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    # Apply migrations, then start.
    command: sh -c "pnpm --filter @p2p/api exec prisma migrate deploy && node packages/api/dist/server.js"
    environment:
      NODE_ENV: production
      PORT: 8081
      DATABASE_URL: postgresql://rivulet:${POSTGRES_PASSWORD}@postgres:5432/rivulet?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INTERNAL_API_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      WEB_ORIGIN: https://${RS_DOMAIN:?RS_DOMAIN is required}
      COOKIE_SECURE: "true"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # /turn-credentials mints coturn credentials with this secret. It must be
      # the same value coturn runs with, and it must never reach the browser.
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_URLS: ${TURN_URLS:-}
    depends_on:
      postgres:
        condition: service_healthy

  signaling:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: node packages/signaling/dist/server.js
    environment:
      PORT: 8080
      # Must match the API's JWT_SECRET / INTERNAL_API_SECRET.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      API_INTERNAL_URL: http://api:8081
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      # VITE_* values are inlined at BUILD time — they are the URLs the
      # visitor's browser will call, i.e. the public domain, not service names.
      args:
        VITE_API_URL: https://${RS_DOMAIN}/api
        VITE_SIGNALING_URL: wss://${RS_DOMAIN}/ws
        VITE_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
        VITE_STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
        VITE_TURN_URL: ${TURN_URL:-}
        VITE_TURN_USERNAME: ${TURN_USERNAME:-}
        VITE_TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    restart: unless-stopped
    depends_on:
      - api
      - signaling

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      RS_DOMAIN: ${RS_DOMAIN:?RS_DOMAIN is required}
      RS_ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates live here — keep the volume and renewals survive restarts.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - signaling

  # TURN relay. Enabled through COMPOSE_PROFILES=coturn in .env, which the
  # installer sets unless you pointed it at an external relay.
  coturn:
    image: coturn/coturn:4.6-alpine
    profiles: ["coturn"]
    restart: unless-stopped
    # Host networking on purpose: a relay needs a wide UDP port range, and
    # publishing hundreds of ports through Docker's userland proxy is both slow
    # to start and bad for throughput. It also lets coturn see real peer
    # addresses instead of the bridge's.
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --fingerprint
      # Shared-secret (REST) auth: credentials are derived and expire, so none
      # are stored here and none are permanent. Must match the API's TURN_SECRET.
      - --use-auth-secret
      # Compose interpolates before it filters by profile, so these must hold a
      # value in .env even when coturn is switched off.
      - --static-auth-secret=${TURN_SECRET:?TURN_SECRET must be set in .env, even with coturn disabled}
      - --realm=${RS_DOMAIN:?RS_DOMAIN is required}
      # Cloud VMs usually have a private address with 1:1 NAT to a public one;
      # without this coturn would hand out the unreachable private address.
      - --external-ip=${PUBLIC_IP:?PUBLIC_IP must be set in .env, even with coturn disabled}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      # No certificates here: WebRTC already encrypts end-to-end, so the relay
      # forwards ciphertext either way. TLS on 5349 would only add firewall
      # traversal, at the cost of sharing and reloading Caddy's certificates.
      - --no-tls
      - --no-dtls
      # The admin interface would otherwise listen on the host.
      - --no-cli
      - --no-multicast-peers
      # A relay that will forward to private ranges is an open proxy into this
      # host's own network — including Postgres and the cloud metadata service
      # at 169.254.169.254. Refuse them all.
      - --denied-peer-ip=0.0.0.0-0.255.255.255
      - --denied-peer-ip=10.0.0.0-10.255.255.255
      - --denied-peer-ip=100.64.0.0-100.127.255.255
      - --denied-peer-ip=127.0.0.0-127.255.255.255
      - --denied-peer-ip=169.254.0.0-169.254.255.255
      - --denied-peer-ip=172.16.0.0-172.31.255.255
      - --denied-peer-ip=192.168.0.0-192.168.255.255
      - --denied-peer-ip=::1
      - --denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
      - --denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

volumes:
  pgdata:
  caddy_data:
  caddy_config:
